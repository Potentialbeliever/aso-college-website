<header class="hero small-hero">
  <h1>Gallery</h1>
  <p>Explore moments from our classes, events, and student life.</p>
</header>

<section>
  <h2>Photo Highlights</h2>
  <div id="galleryGrid" class="gallery-grid" aria-live="polite"></div>
<script>
  (async function () {
    try {
      const res = await fetch("/data/gallery.json", { cache: "no-store" });
      const data = await res.json();
      const items = Array.isArray(data) ? data : (data.items || []);
      const grid = document.getElementById("galleryGrid");
      if (!Array.isArray(items) || items.length === 0) {
        grid.innerHTML = `<p style="opacity:.8">No gallery items yet.</p>`;
        return;
      }
      grid.innerHTML = items.map(i => {
        const title = (i.title || "Photo").toString();
        const img = (i.image || "").toString();
        const desc = (i.description || "").toString();
        return `
          <figure class="gallery-card">
            <a href="${img}" target="_blank" rel="noopener">
              <img src="${img}" alt="${title}" loading="lazy" decoding="async">
            </a>
            <figcaption class="gallery-meta">
              <h3>${title}</h3>
              ${desc ? `<p>${desc}</p>` : ``}
            </figcaption>
          </figure>
        `;
      }).join("");
    } catch (e) {
      const grid = document.getElementById("galleryGrid");
      if (grid) grid.innerHTML = `<p style="opacity:.8">Gallery failed to load. Please refresh.</p>`;
    }
  })();
</script>
</section>

<footer>

</body>
