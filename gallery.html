<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery - ASO College</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-container {
            padding: 40px;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .gallery-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        .gallery-grid img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>
    <h1>ASO College Gallery</h1>
</header>

<section class="gallery-container">
    <h2>School Activities & Events</h2>
