<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ASO College Admissions</title>

  <!-- LINK YOUR CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- jsPDF for PDF creation -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>

<!-- NAVIGATION BAR -->
<nav>
  <div class="logo">
    <img src="images/logo.png" alt="ASO College Logo">
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="programs.html">Programs</a>
    <a class="active" href="admissions.html">Admissions</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>


<!-- HERO HEADER -->
<header class="hero small-hero">
  <h1>Admissions</h1>
  <p>Start your journey with ASO College of Stewardship</p>
</header>


<!-- ADMISSION FORM -->
<section>
<form id="admissionForm" onsubmit="return false;">

  <h3>Student Admission Form</h3>

  <label>Full Name *</label>
  <input id="name" type="text" required>

  <label>Date of Birth</label>
  <input id="dob" type="date">

  <label>Country of Origin</label>
  <input id="country" type="text">

  <label>Nationality</label>
  <input id="nationality" type="text">

  <label>Hometown</label>
  <input id="hometown" type="text">

  <label>Region / Province</label>
  <input id="region" type="text">

  <label>Level of Education</label>
  <select id="education">
    <option value="">Select level</option>
    <option>University</option>
    <option>Senior High</option>
    <option>Junior High</option>
    <option>Primary</option>
    <option>None</option>
  </select>

  <label>Profession</label>
  <input id="profession" type="text">

  <label>Email</label>
  <input id="email" type="email">

  <label>Phone Number *</label>
  <input id="phone" type="tel" required>

  <label>Residential Address</label>
  <textarea id="address"></textarea>

  <label>Program of Interest *</label>
  <input id="program" type="text" required>

  <button type="button" onclick="downloadPDF()">Download PDF</button>
  <button type="button" onclick="sendWhatsApp()">Send to WhatsApp</button>
  <button type="button" onclick="sendTelegram()">Send to Telegram Bot</button>

</form>
</section>


<!-- FOOTER -->
<footer>
  <p>© 2025 ASO College of Stewardship — Institute of Excellence |
    <a href="mailto:saviouragbelegbe@gmail.com">Email</a> |
    <a href="tel:+233546669312">Call</a>
  </p>
</footer>


<!-- ========= JAVASCRIPT LOGIC ========= -->
<script>
  const WHATSAPP_NUMBER = "233546669312";

  // Replace with REAL Telegram Bot Token + Chat ID
  const TELEGRAM_BOT_TOKEN = "REPLACE_WITH_YOUR_BOT_TOKEN";
  const TELEGRAM_CHAT_ID = "REPLACE_WITH_CHAT_ID";

  function getData() {
    return {
      name: name.value.trim(),
      dob: dob.value.trim(),
      country: country.value.trim(),
      nationality: nationality.value.trim(),
      hometown: hometown.value.trim(),
      region: region.value.trim(),
      education: education.value.trim(),
      profession: profession.value.trim(),
      email: email.value.trim(),
      phone: phone.value.trim(),
      address: address.value.trim(),
      program: program.value.trim()
    };
  }

  function validate() {
    const d = getData();
    if (!d.name) return alert("Name is required");
    if (!d.phone) return alert("Phone is required");
    if (!d.program) return alert("Program is required");
    return true;
  }

  function buildMessage(d) {
    return `
ASO College – New Admission

Name: ${d.name}
DOB: ${d.dob}
Country: ${d.country}
Nationality: ${d.nationality}
Hometown: ${d.hometown}
Region: ${d.region}
Education: ${d.education}
Profession: ${d.profession}
Email: ${d.email}
Phone: ${d.phone}
Address: ${d.address}
Program: ${d.program}

Submitted: ${new Date().toLocaleString()}
`;
  }

  // -------- PDF Generation --------
  async function downloadPDF() {
    if (!validate()) return;

    const { jsPDF } = window.jspdf;
    const d = getData();
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("ASO College of Stewardship", 10, 20);

    doc.setFontSize(12);
    let y = 35;

    for (const key in d) {
      doc.text(`${key.toUpperCase()}: ${d[key] || "-"}`, 10, y);
      y += 10;
    }

    doc.save("ASO_Admission_" + d.name.replace(/\s+/g, "_") + ".pdf");
  }

  // -------- WhatsApp --------
  function sendWhatsApp() {
    if (!validate()) return;
    const d = getData();
    const message = encodeURIComponent(buildMessage(d));
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, "_blank");
  }

  // -------- Telegram Bot --------
  function sendTelegram() {
    if (!validate()) return;

    if (TELEGRAM_BOT_TOKEN.includes("REPLACE")) {
      alert("Add your Telegram Bot Token first.");
      return;
    }

    const d = getData();
    const text = buildMessage(d);

    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: text
      })
    })
    .then(r => r.json())
    .then(r => {
      if (r.ok) alert("Sent to Telegram Bot!");
      else {
        alert("Telegram Bot Failed. Opening Telegram app instead.");
        window.open("https://t.me/share/url?url=&text=" + encodeURIComponent(text), "_blank");
      }
    })
    .catch(() => {
      alert("Telegram Error. Opening Telegram app.");
      window.open("https://t.me/share/url?url=&text=" + encodeURIComponent(text), "_blank");
    });
  }
</script>

</body>
</html>
